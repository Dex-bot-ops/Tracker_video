name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Python files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.py

      - name: Configure uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Check formatting with Ruff on modified files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uvx ruff format --check ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run Ruff Linting on modified files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uvx ruff check ${{ steps.changed-files.outputs.all_changed_files }}
  
  backend-test:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install pytest fastapi uvicorn websockets psutil pynvml opencv-python-headless ultralytics

      - name: Run Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest backend/tests/ -v

  frontend-lint:
    name: Frontend Lint & Build (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript & Vite Build
        run: npm run build

      - name: Run Unit Tests (Vitest)
        run: npm run test -- --run
